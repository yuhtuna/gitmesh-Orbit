stages:
  - generate_3d

variables:
  LLM_PROVIDER: "vertex"
  USE_ADK_ORCHESTRATOR: "true"
  ADK_HARD_FAIL: "false"
  PIPELINE_DRY_RUN: "false"
  AUTO_CLOSE_ISSUE: "true"
  ISSUE_TITLE: "Fallback Prompt"
  ISSUE_DESC: ""
  ISSUE_IID: ""
  GITLAB_API_URL: "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID"
  MODAL_LOGLEVEL: "DEBUG"
  GRPC_VERBOSITY: "DEBUG"

run_gitmesh_pipeline:
  stage: generate_3d
  image: python:3.10-slim
  before_script:
    - apt-get update && apt-get install -y curl dnsutils
    - nslookup api.modal.com || true
    - curl -Iv https://api.modal.com || true
  script: |
    set -e
    require_var() {
      var_name="$1"
      eval "var_value=\${$var_name:-}"
      if [ -z "$var_value" ]; then
        echo "Missing required CI/CD variable: $var_name"
        exit 1
      fi
    }

    echo "Running GitMesh remote preflight checks..."
    require_var GITLAB_API_TOKEN
    require_var ISSUE_IID
    require_var ISSUE_TITLE

    # Multi-project routing: when triggered on behalf of an onboarded target
    # project, route GitLab API calls (progress comments, auto-close) to that
    # project. The compute stages additionally resolve the target's API token
    # from the registry at runtime. Defaults to the engine project otherwise.
    if [ -n "${TARGET_PROJECT_ID:-}" ]; then
      TARGET_BASE="${TARGET_GITLAB_URL:-https://gitlab.com}"
      GITLAB_API_URL="${TARGET_BASE%/}/api/v4/projects/${TARGET_PROJECT_ID}"
      echo "Multi-project run: routing GitLab API to ${GITLAB_API_URL}"
    fi

    if [ "${PIPELINE_DRY_RUN:-false}" != "true" ]; then
      require_var MODAL_TOKEN_ID
      require_var MODAL_TOKEN_SECRET
    fi

    if [ "${LLM_PROVIDER}" != "vertex" ]; then
      echo "LLM_PROVIDER must be 'vertex' for remote GitLab production runs. Current value: ${LLM_PROVIDER}"
      exit 1
    fi

    if [ -n "${GEMINI_API_KEY:-}" ]; then
      echo "GEMINI_API_KEY must not be set in remote GitLab production. Use Vertex credentials in Modal secret gitmesh-keys."
      exit 1
    fi

    if [ "${PIPELINE_DRY_RUN:-false}" = "true" ]; then
      echo "PIPELINE_DRY_RUN=true: simulating stages without Modal execution."
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🧪 Dry-run mode enabled: validating GitLab automation only (Modal stages are simulated)." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🧠 Stage 1 (simulated): Prompt analysis complete for '${ISSUE_TITLE}'." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=📷 Stage 2 (simulated): Reference image generation complete." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🧊 Stage 3 (simulated): Mesh generation complete." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=✂️ Stage 4 (simulated): Mesh segmentation complete." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🔧 Stages 5-6 (simulated): Blender cleanup + part renders complete." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🏷️ Stage 7 (simulated): Part labeling complete." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🎬 Stage 8 (simulated): Animation planning complete." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=✅ Stage 9 (simulated): Validation complete." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🎬 Stage 10 (simulated): Final export complete." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🏁 Dry-run complete! GitLab trigger/comment/close automation path is working." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      if [ "${AUTO_CLOSE_ISSUE:-true}" = "true" ]; then
        curl --request PUT --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "state_event=close" "${GITLAB_API_URL}/issues/${ISSUE_IID}"
      fi
      exit 0
    fi

    if [ "${USE_ADK_ORCHESTRATOR:-true}" = "true" ]; then
      echo "============================================="
      echo " GitMesh ADK-first orchestration enabled"
      echo " ADK_HARD_FAIL=${ADK_HARD_FAIL:-false}"
      echo "============================================="
      pip install --no-cache-dir -r requirements.txt
      if python agent.py --remote-ci; then
        echo "ADK orchestrator completed successfully."
        exit 0
      else
        adk_status="$?"
      fi

      echo "ADK orchestrator failed with status ${adk_status}."
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=⚠️ GitMesh ADK orchestrator failed with status ${adk_status}. ${ADK_HARD_FAIL:-false} determines whether legacy fallback runs." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      if [ "${ADK_HARD_FAIL:-false}" = "true" ]; then
        exit "${adk_status}"
      fi
      echo "ADK_HARD_FAIL=false: falling back to direct Modal stage chain."
    fi

    echo "============================================="
    echo " GitMesh v1.4 - 10-Stage AI Asset Pipeline"
    echo " Triggered by Issue #${ISSUE_IID}"
    echo " Prompt: ${ISSUE_TITLE}"
    echo "============================================="
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🚀 GitMesh Pipeline Started! Asset: ${ISSUE_TITLE} (Issue #${ISSUE_IID}, 10 stages)" "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    pip install modal
    if ! modal secret list | grep -q "gitmesh-keys"; then
      echo "Modal secret 'gitmesh-keys' was not found. Create it with GCP_PROJECT_ID, GCP_SERVICE_ACCOUNT_JSON, LLM_PROVIDER=vertex, and IMAGE_MODEL."
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=❌ GitMesh preflight failed: Modal secret gitmesh-keys was not found. Configure remote Vertex credentials before retrying." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
      exit 1
    fi
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=✅ GitMesh remote preflight passed: GitLab CI variables and Modal secret are configured for Vertex." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🧠 Stage 1: Gemini Brain - Analyzing prompt and planning pipeline..." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=📷 Stage 2: Reference Image - Generating via configured Vertex image model..." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    modal run modal_app.py::generate_reference_image --prompt "${ISSUE_TITLE}" --issue-desc "${ISSUE_DESC}" --issue-iid "${ISSUE_IID}" --gitlab-token "${GITLAB_API_TOKEN}"
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🧊 Stage 3: Mesh Generation - Offloading to Modal GPU (L4)..." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    modal run modal_app.py::generate_3d_mesh --prompt "${ISSUE_TITLE}" --issue-desc "${ISSUE_DESC}" --style "lowpoly" --issue-iid "${ISSUE_IID}" --gitlab-token "${GITLAB_API_TOKEN}"
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🔍 Stage 3b: GLB Validation - Checking mesh integrity..." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    modal run modal_app.py::validate_glb --issue-iid "${ISSUE_IID}" --gitlab-token "${GITLAB_API_TOKEN}"
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=✂️ Stage 4: Segmentation - Running deterministic template-based cutting..." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    modal run modal_app.py::segment_mesh --issue-iid "${ISSUE_IID}" --gitlab-token "${GITLAB_API_TOKEN}"
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🔧 Stages 5-6: Blender - Cleaning edges and rendering parts..." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🏷️ Stage 7: Part Labeling - Classifying with Gemini Flash Lite..." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    modal run modal_app.py::label_parts --asset-name "${ISSUE_TITLE}" --issue-iid "${ISSUE_IID}" --gitlab-token "${GITLAB_API_TOKEN}"
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🎬 Stage 8: Animation Planning - Gemini Flash generating motion plan..." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    modal run modal_app.py::generate_animation_plan --asset-name "${ISSUE_TITLE}" --issue-iid "${ISSUE_IID}" --gitlab-token "${GITLAB_API_TOKEN}"
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=✅ Stage 9: Validation - Running geometric checks..." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    modal run modal_app.py::validate_animation_plan --issue-iid "${ISSUE_IID}" --gitlab-token "${GITLAB_API_TOKEN}"
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🎬 Stage 10: Final Export - Blender headless rendering..." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    modal run modal_app.py::animate_and_render_mesh --issue-iid "${ISSUE_IID}" --gitlab-token "${GITLAB_API_TOKEN}"
    echo "============================================="
    echo " Pipeline Complete! Finalizing issue #${ISSUE_IID}"
    echo "============================================="
    curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=🏁 Pipeline Complete! All 10 stages finished. Asset: ${ISSUE_TITLE} - Status: Ready for review" "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    if [ "${AUTO_CLOSE_ISSUE:-true}" = "true" ]; then
      echo "AUTO_CLOSE_ISSUE=true: closing issue #${ISSUE_IID}"
      curl --request PUT --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "state_event=close" "${GITLAB_API_URL}/issues/${ISSUE_IID}"
    else
      echo "AUTO_CLOSE_ISSUE=false: leaving issue #${ISSUE_IID} open"
      curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" --form "body=ℹ️ Auto-close disabled for this run (AUTO_CLOSE_ISSUE=false). Keeping issue open for manual review." "${GITLAB_API_URL}/issues/${ISSUE_IID}/notes"
    fi
  only:
    - triggers
